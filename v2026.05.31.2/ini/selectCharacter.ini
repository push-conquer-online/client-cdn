[info]
info0=~~~~The taoist is a master of abundant magic spells. They can choose to\n~~~~be fire taoists who are good at magic damage or water taoists who are\n~~~~great for buffing allies.
info1=~~~~Wielding their dual weapons, trojans are the highest melee damage\n~~~~dealers, and are capable of wearing light armors.
info2=~~~~The archer is the best ranged attack class. Furthermore, it's the\n~~~~only class that can evade blows by flying.
info3=~~~~The warrior is a great tank class, especially when employing a\n~~~~shield for additional defense.
infoII0=You can be a water or fire taoist\nwhen promoted at level 40. The fire\ntaoist is the most dangerous magic\nusing class, learning devastating\nspells and causing more damage than\nother taoists. The water taoist can\nstudy spells that heal, cure or\nrevive others, having lower\nrequirements for many quests\n(such as rebirth).
infoII1=The trojan is an all-out offensive\nmelee combat class. Wielding their\ndual weapons, they charge fearlessly\ninto fights. However, trojans have\nlower defense compared to warriors,\nso they have to be careful when\ntaking on mobs of enemies, as they\ncan be overpowered by numerous\nopponents.
infoII2=Archers are swift characters capable\nof flying, shooting multiple targets,\nusing magical defenses and taking\ndown their enemies at range. Because\nof these they excel as hunters and\npowerful levelers. The archer is a\nvital key to keeping commerce alive\nand helping level up water Taoist\nand other characters.
infoII3=The warrior is a rough and ready\nmelee combat class. They are adept\nin the use of all kinds of weapons\nand can put on the heaviest armors\nof any class. In addition they can\nuse shields for additional defense.

